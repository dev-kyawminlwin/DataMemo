services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: datamemo
      POSTGRES_PASSWORD: datamemo
      POSTGRES_DB: datamemo
    ports:
      - "5432:5432"
    volumes:
      - datamemo_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datamemo -d datamemo"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    # Helps avoid "could not resize shared memory" under heavy load on some hosts
    shm_size: 256mb

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - datamemo_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  datamemo_pg:
  datamemo_redis:
